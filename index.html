<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fo24 Haushalts-Übungssassistent</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
.step { display: none; }
.step.active { display: block; }
</style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

<div class="bg-white p-8 rounded-2xl shadow-xl max-w-2xl w-full border">

<!-- HEADER -->
<div class="mb-6 text-center">
    <h1 class="text-xl font-bold">Haushalts-Prüfungsassistent</h1>
    <div class="w-full bg-slate-200 h-2 mt-3 rounded">
        <div id="progress" class="bg-blue-500 h-2 rounded transition-all"></div>
    </div>
</div>

<!-- WIZARD -->
<div id="wizard"></div>

<!-- RESULT -->
<div id="result" class="hidden mt-6">
    <h2 id="resTitle" class="text-xl font-bold mb-2"></h2>
    <p id="resDesc" class="mb-4"></p>

    <div class="bg-slate-50 p-3 text-xs font-mono mb-4 max-h-40 overflow-auto">
        <pre id="resSummary"></pre>
    </div>

    <button onclick="exportTxt()" class="bg-black text-white px-4 py-2 rounded mb-2">
        📄 Export
    </button>

    <br>
    <button onclick="location.reload()" class="text-sm underline">
        Neu starten
    </button>
</div>

</div>

<script>
let currentStep = 1;
let history = [1];
let answers = {};
let notes = {};
let finalStatus = "";
let finalDetail = "";

const flow = {
    1: {
        type: "form",
        render: () => `
            <input id="titel_zu" type="text" placeholder="Zu Gunsten von (z. B. 511 01-1)" class="w-full border p-2 mb-2 rounded">
            <input id="pgr_zu" type="text" placeholder="Produktgruppe (z. B. 50.01.01)" class="w-full border p-2 mb-2 rounded">
            <input id="titel_von" type="text" placeholder="Zu Lasten von (z. B. 511 01-1)" class="w-full border p-2 mb-2 rounded">
            <input id="pgr_von" type="text" placeholder="Produktgruppe (z. B. 50.01.01)" class="w-full border p-2 mb-2 rounded">
            <input id="input_betrag" type="number" placeholder="Betrag €" class="w-full border p-2 mb-2 rounded">`,
        next: () => 2
    },
    2: {
        question: "Haben beide Titel einen Haushaltsvermerk (HV)?",
        type: "select",
        options: ["ja", "nein"],
        next: { "ja": 3, "nein": 4 },
    },
    3: {
        question: "Regeln beide Haushaltsvermerke die gegenseitige Deckungsfähigkeit (DF)? Ggf. auch über einen Deckungskreis.",
        type: "select",
        options: ["ja", "nein"],
        next: { "ja": "END_SUCCESS", "nein": 4 },
        resultText: "Deckungsfähigkeit durch HV gegeben. Die Mehrausgabe ist zulässig."
    },
    4: {
        question: "Besteht eine gegenseitige Deckungsfähigkeit nach §3 Abs. 1 HG",
        type: "select",
        options: ["ja", "nein"],
        next: { "ja": 5, "nein": 6 },
    },
     5: {
        getQuestion: () => {
        const von = answers.titel_von || "unbekannt";
        const zu = answers.titel_zu || "unbekannt";
            return `Verfügt der Titel ${von} über einen HV der eine DF mit einem anderen Titel als ${zu} regelt?`;
        }
        type: "select",
        options: ["ja", "nein"],
        next: { "ja": 6, "nein": "END_SUCCESS" },
        resultText: "Deckungsfähigkeit nach §3 Abs. 1 HG gegeben. Die Mehrausgabe ist zulässig."
    },
    6: {
        question: "Deckung durch Mehreinnahmen möglich?",
        type: "select",
        options: ["ja", "nein"],
        next: { "ja": "END_CHECK", "nein": "END_CHECK" }
    }
};

function next() {
    // WICHTIG: Daten sichern solange sie noch im DOM sind
    if (currentStep === 1) {
        answers.titel_zu = document.getElementById('titel_zu').value;
        answers.titel_von = document.getElementById('titel_von').value;
        answers.pgr_zu = document.getElementById('pgr_zu').value;
        answers.pgr_von = document.getElementById('pgr_von').value;
        answers.betrag = parseFloat(document.getElementById('input_betrag').value) || 0;
    }

    saveNote();
    const step = flow[currentStep];
    let inputVal = "";

    if (step.type === "select") {
        inputVal = document.querySelector("select")?.value;
        if (!inputVal) return alert("Bitte auswählen");
        answers[currentStep] = inputVal;
    }

    let nextStep = typeof step.next === "function" ? step.next() : step.next[inputVal];

    if (nextStep === "END_SUCCESS") {
        finalStatus = "ZULÄSSIG";
        finalDetail = step.resultText;
        return showResult();
    }
    if (nextStep === "END_CHECK") return finalCheck();

    goTo(nextStep);
}

function goTo(step) {
    currentStep = step;
    history.push(step);
    render();
}

function back() {
    if (history.length > 1) {
        history.pop();
        currentStep = history[history.length - 1];
        render();
    }
}

function render() {
    const step = flow[currentStep];
    const el = document.getElementById("wizard");
    let html = "";
    const questionText = step.getQuestion ? step.getQuestion() : step.question;
    
    if (questionText) {
        html += `<h2 class="font-bold mb-3">${questionText}</h2>`;
    }
    if (step.type === "form") html += step.render();
    if (step.type === "select") {
        html += `<select class="w-full border p-2 mb-3 rounded">
                    <option value="">Bitte wählen</option>
                    ${step.options.map(o => `<option value="${o}">${o}</option>`).join("")}
                 </select>`;
    }

    html += `<textarea id="note" placeholder="Dein Prüftext" class="w-full border p-2 mb-3 rounded"></textarea>`;
    html += `<div class="flex gap-2">
                <button onclick="next()" class="bg-blue-600 text-white px-4 py-2 rounded flex-1">Weiter</button>
                ${currentStep > 1 ? `<button onclick="back()" class="bg-gray-300 px-4 py-2 rounded flex-1">Zurück</button>` : ''}
             </div>`;
    el.innerHTML = html;
    updateProgress();
}

function saveNote() {
    const val = document.getElementById("note")?.value;
    if (val) notes[currentStep] = val;
}

// MUSTER TEXT fix: Nutzt jetzt 'answers' statt 'document.getElementById'
function getMusterText(stepNum) {
    const betrag = answers.betrag || "0";
    const von = answers.titel_von || "";
    const zu = answers.titel_zu || "";
    const pgr_von = answers.pgr_von || "";
    const pgr_zu = answers.pgr_zu || "";
    const HV = answers[2];

    const texte = {
        1: `Fraglich ist, ob zusätzliche Ausgaben in Höhe von ${betrag}€ bei Titel ${zu} zu Lasten von Titel ${von} geleistet werden dürfen.`,
        2: "Zunächst ist eine Deckungsfähigkeit(DF) über Haushaltsvermerke (HV) zu prüfen. Dafür müssten bei beiden Titeln HV vorliegen und diese die DF mit dem jeweils anderen Titel regeln.",
        3: HV === "ja" 
            ? `Sowohl Titel ${zu} als auch Titel ${von} haben einen HV, welcher die gegenseitige Deckungsfähigkeit regelt. Damit können die zusätzlichen Ausgaben bei Titel ${zu} geleistet werden `
            : "Einer der beiden Titel hat keinen HV, damit ist eine gegenseitige DF durch HV ausgeschlossen."
        4: "Prüfung §3 HG abgeschlossen.",
        5: "Prüfung Mehreinnahmen abgeschlossen."
    };
    return texte[stepNum] || "";
}

// FINAL CHECK fix: Nutzt jetzt 'answers'
function finalCheck() {
    const betrag = answers.betrag || 0;
    const von = answers.titel_von || "";
    const zu = answers.titel_zu || "";
    const pgr_von = answers.pgr_von || "";
    const pgr_zu = answers.pgr_zu || "";

    if (von.startsWith('441')) {
        finalStatus = "VORLAGE";
        finalDetail = "Titel 441 ist gesperrt.";
    } else if (zu.startsWith('42') && !von.startsWith('42')) {
        finalStatus = "VORLAGE";
        finalDetail = "Personalausgaben dürfen nur durch Personalausgaben gedeckt werden.";
    } else if (betrag >= 100000) {
        finalStatus = "VORLAGE";
        finalDetail = "Betrag über 100.000 € erfordert Vorlage.";
    } else {
        finalStatus = "ZULÄSSIG";
        finalDetail = "Die Maßnahme ist haushaltsrechtlich zulässig.";
    }
    showResult();
}

function showResult() {
    document.getElementById("wizard").innerHTML = "";
    document.getElementById("result").classList.remove("hidden");
    document.getElementById("resTitle").innerText = finalStatus === "ZULÄSSIG" ? "✅ Zulässig" : "⚖️ Vorlage";
    document.getElementById("resDesc").innerText = finalDetail;

    const notesText = Object.entries(notes).map(([k,v]) => `Schritt ${k}: ${v}`).join("\n");
    let muster = history.map(s => getMusterText(s)).join("\n");

    document.getElementById("resSummary").innerText = 
        `DATEN: ${answers.betrag}€ von ${answers.titel_von} an ${answers.titel_zu}\n\n` +
        `NOTIZEN:\n${notesText}\n\nMUSTER:\n${muster}`;
    document.getElementById("progress").style.width = "100%";
}

function updateProgress() {
    const total = Object.keys(flow).length;
    const p = (currentStep / total) * 100;
    document.getElementById("progress").style.width = p + "%";
}

render();
</script>
</body>
</html>

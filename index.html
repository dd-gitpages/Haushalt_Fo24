<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lernassistent Fo24 Haushalt</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    .step { display: none; }
    .step.active { display: block; }
</style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

<div class="bg-white p-8 rounded-2xl shadow-xl max-w-2xl w-full border">

    <div class="mb-6 text-center">
        <h1 class="text-xl font-bold">Lernassistent Fo24 Haushalt</h1>
        <div class="w-full bg-slate-200 h-2 mt-3 rounded">
            <div id="progress" class="bg-blue-500 h-2 rounded transition-all"></div>
        </div>
    </div>

    <div id="wizard"></div>

    <div id="result" class="hidden mt-6">
        <h2 id="resTitle" class="text-xl font-bold mb-2"></h2>
        <p id="resDesc" class="mb-4"></p>

        <div class="bg-slate-100 p-4 rounded-lg mb-4 text-sm font-mono whitespace-pre-wrap border" id="resSummary"></div>
        
        <div class="space-y-4">
            <div id="userPathSection">
                <h3 class="font-bold text-blue-700 underline mb-2">Dein gewählter Weg:</h3>
                <div id="userPathText" class="text-sm bg-blue-50 p-3 rounded border border-blue-200 whitespace-pre-wrap"></div>
            </div>
            <div id="correctPathSection">
                <h3 class="font-bold text-green-700 underline mb-2">Objektive Musterlösung:</h3>
                <div id="correctPathText" class="text-sm bg-green-50 p-3 rounded border border-green-200 whitespace-pre-wrap"></div>
            </div>
        </div>

        <button onclick="location.reload()" class="mt-6 w-full bg-slate-800 text-white py-2 rounded-xl hover:bg-slate-900 transition">Neu starten</button>
    </div>

</div>

<script>
// --- KONFIGURATION & DATEN ---
const flow = {
    1: { 
        q: "Schritt 1: Obersatz formulieren", 
        info: "Ermittlung der Fallgrundlagen.",
        next: 2 
    },
    2: { 
        q: "Gibt es einen Haushaltsvermerk (HV), der die Deckungsfähigkeit (DF) regelt?", 
        options: [
            { t: "Ja (HV vorhanden)", next: 3, label: "Prüfung HV" },
            { t: "Nein (Kein HV)", next: 4, label: "Prüfung HV" }
        ]
    },
    3: { q: "Ist die Maßnahme laut HV zulässig?", options: [{ t: "Ja", next: "END", label: "Zulässig nach HV" }, { t: "Nein", next: 4, label: "Nicht zulässig nach HV" }] },
    4: { 
        q: "Liegen beide Titel in der gleichen Produktgruppe (PGr)?", 
        options: [
            { t: "Ja", next: 5, label: "DF nach §3 (Produktgruppe)" },
            { t: "Nein", next: 7, label: "DF nach §3 (Produktgruppe)" }
        ]
    },
    5: { 
        q: "Trifft eine der Nummern 1-5 aus §3 Abs. 1 HG zu? (z.B. Personal, gleiche HG 4-6)", 
        options: [
            { t: "Ja", next: 6, label: "DF nach §3 (Nr. 1-5)" },
            { t: "Nein", next: 7, label: "DF nach §3 (Nr. 1-5)" }
        ]
    },
    6: { q: "Ergebnis: Die Maßnahme ist nach §3 HG zulässig.", options: [{ t: "Weiter zum Abschluss", next: "END" }] },
    7: { 
        q: "Da §3 nicht greift: Welcher Absatz von §4 HG (Nachbewilligung) ist zuerst zu prüfen?", 
        options: [
            { t: "§4 Abs. 1 (Produktgruppe)", next: 8, label: "Nachbewilligung ($4 Absatz erkennen)" },
            { t: "§4 Abs. 2 (Produktbereich)", next: 12, label: "Nachbewilligung ($4 Absatz erkennen)" },
            { t: "§4 Abs. 3 (Produktplan)", next: 15, label: "Nachbewilligung ($4 Absatz erkennen)" }
        ]
    },
    8: { q: "Sind beide Titel in der gleichen Produktgruppe?", options: [{ t: "Ja", next: 9, label: "§4 Abs. 1 (Produktgruppe)" }, { t: "Nein", next: 12, label: "§4 Abs. 1 (Produktgruppe)" }] },
    9: { q: "Liegt eine Ausnahme nach §4 Abs. 1 Nr. 1 vor (Investiv zu Konsumptiv)?", options: [{ t: "Ja (Ausnahme greift)", next: 20, label: "§4 Abs. 1 Nr. 1 (5,6 -> 78)" }, { t: "Nein", next: 10, label: "§4 Abs. 1 Nr. 1 (5,6 -> 78)" }] },
    10: { q: "Liegt der Betrag unter 100.000 €?", options: [{ t: "Ja", next: 11, label: "§4 Abs. 1 (<100000 €)" }, { t: "Nein", next: 21, label: "§4 Abs. 1 (<100000 €)" }] },
    11: { q: "Zuständigkeit: PGr-Verantwortliche Person (§4 Abs. 1).", options: [{ t: "Abschluss", next: "END" }] },
    12: { q: "Sind beide Titel im gleichen Produktbereich?", options: [{ t: "Ja", next: 13, label: "§4 Abs. 2 (Produktbereich)" }, { t: "Nein", next: 15, label: "§4 Abs. 2 (Produktbereich)" }] },
    13: { q: "Liegt der Betrag unter 100.000 €?", options: [{ t: "Ja", next: 14, label: "§4 Abs. 2 (<100000 €)" }, { t: "Nein", next: 21, label: "§4 Abs. 2 (<100000 €)" }] },
    14: { q: "Liegt eine Ausnahme nach §4 Abs. 2 Nr. 1-3 vor?", options: [{ t: "Ja", next: 20, label: "§4 Abs. 2 (Ausnahmen Nr. 1-3)" }, { t: "Nein", next: "END", label: "§4 Abs. 2 (Ausnahmen Nr. 1-3)" }] },
    15: { q: "Sind beide Titel im gleichen Produktplan?", options: [{ t: "Ja", next: 16, label: "§4 Abs. 3 (Produktplan)" }, { t: "Nein", next: 20, label: "§4 Abs. 3 (Produktplan)" }] },
    16: { q: "Liegt der Betrag unter 100.000 €?", options: [{ t: "Ja", next: 17, label: "§4 Abs. 3 (<100000 €)" }, { t: "Nein", next: 21, label: "§4 Abs. 3 (<100000 €)" }] },
    17: { q: "Liegt eine Ausnahme nach §4 Abs. 3 vor?", options: [{ t: "Ja", next: 20, label: "§4 Abs. 3 (Ausnahmen)" }, { t: "Nein", next: "END", label: "§4 Abs. 3 (Ausnahmen)" }] },
    20: { q: "Ist die Nachbewilligung durch den Senator für Finanzen nach §10 Abs. 4 Nr. 3 zulässig (bis 100.000 €)?", options: [{ t: "Ja (<100.000 €)", next: "END", label: "§10 Abs. 4 Nr. 3 (<100000 €)" }, { t: "Nein (>100.000 €)", next: 21, label: "§10 Abs. 4 Nr. 3 (<100000 €)" }] },
    21: { q: "Zuständigkeit: HFA nach §9 Abs. 2 Nr. 1 HG (über 100.000 €).", options: [{ t: "Abschluss", next: "END" }] }
};

let currentStep = 1;
let answers = {
    titel_zu: "511 01-1", pgr_zu: "50.01.01",
    titel_von: "811 01-1", pgr_von: "50.01.02",
    betrag: "50000"
};
let istPfad = [];

// --- INITIALISIERUNG ---
function init() {
    const params = new URLSearchParams(window.location.search);
    if(params.has('zu')) answers.titel_zu = params.get('zu');
    if(params.has('pgrzu')) answers.pgr_zu = params.get('pgrzu');
    if(params.has('von')) answers.titel_von = params.get('von');
    if(params.has('pgrvon')) answers.pgr_von = params.get('pgrvon');
    if(params.has('betrag')) answers.betrag = params.get('betrag');
    
    renderStep();
}

function renderStep() {
    const stepData = flow[currentStep];
    const container = document.getElementById("wizard");
    const progress = (Object.keys(answers).length / 20) * 100; // Vereinfacht
    document.getElementById("progress").style.width = progress + "%";

    let html = `<div class="step active">
        <p class="text-sm text-slate-500 mb-1">Schritt ${currentStep}</p>
        <h2 class="text-xl font-semibold mb-4">${stepData.q}</h2>`;
    
    if(stepData.options) {
        stepData.options.forEach(opt => {
            html += `<button onclick="handleAnswer('${opt.next}', '${opt.t}', '${opt.label}')" 
                class="w-full text-left p-3 mb-2 border rounded-xl hover:bg-blue-50 hover:border-blue-300 transition">
                ${opt.t}
            </button>`;
        });
    } else {
        html += `<button onclick="handleAnswer(${stepData.next}, 'Weiter', 'Obersatz')" 
            class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 transition">Weiter</button>`;
    }
    
    html += `</div>`;
    container.innerHTML = html;
}

function handleAnswer(next, text, label) {
    if(label) istPfad.push({step: currentStep, label: label});
    answers[currentStep] = text;

    if (next === "END") {
        showResult();
    } else {
        currentStep = parseInt(next);
        renderStep();
    }
}

// --- LOGIK-BERECHNUNG ---

function getSollPfad() {
    let pfad = [1, 2]; 
    const von = answers.titel_von || "";
    const zu = answers.titel_zu || "";
    const pgr_von = answers.pgr_von || "";
    const pgr_zu = answers.pgr_zu || "";
    const betrag = parseFloat(answers.betrag) || 0;
    
    const hgVon = von[0];
    const hgZu = zu[0];

    // 1. Prüfung §3 (Produktgruppe)
    pfad.push(4);
    if (pgr_von === pgr_zu) {
        pfad.push(5);
        let nrGefunden = false;
        if ((von.startsWith("422") && zu.startsWith("428")) || (von.startsWith("428") && zu.startsWith("422"))) nrGefunden = true;
        if (hgVon === hgZu && ["4", "5", "6"].includes(hgVon) && !von.startsWith("441") && !zu.startsWith("441")) nrGefunden = true;
        
        if (nrGefunden) {
            pfad.push(6); 
            return pfad;
        }
    }

    // 2. Nachbewilligung §4
    pfad.push(7);
    if (pgr_von === pgr_zu) {
        pfad.push(8, 9);
        if (!((hgVon === "5" || hgVon === "6") && (hgZu === "7" || hgZu === "8"))) {
            pfad.push(10);
            if (betrag < 100000) pfad.push(11); else pfad.push(21);
        } else { pfad.push(20); if (betrag >= 100000) pfad.push(21); }
    } 
    else if (pgr_von.substring(0, 5) === pgr_zu.substring(0, 5)) {
        pfad.push(12, 13);
        if (betrag < 100000) {
            pfad.push(14);
            // Ausnahme Nr. 3: Konsumptiv zu Investiv (HG 5/6 zu 7/8) ist verboten
            if ((hgVon === "5" || hgVon === "6") && (hgZu === "7" || hgZu === "8")) pfad.push(20);
        } else { pfad.push(21); }
    } 
    else {
        pfad.push(15, 20);
        if (betrag >= 100000) pfad.push(21);
    }

    return [...new Set(pfad)].sort((a,b) => a-b);
}

function getMusterText(stepNum, mode = "user") {
    const betrag = answers.betrag;
    const von = answers.titel_von;
    const zu = answers.titel_zu;
    const pgr_von = answers.pgr_von;
    const pgr_zu = answers.pgr_zu;
    
    // Hilfsfunktion für Logik-Entscheidung
    const isJa = (step, condition) => {
        return mode === "user" ? (answers[step] === "Ja" || answers[step] === "Ja (HV vorhanden)") : condition;
    };

    const texte = {
        1: `Fraglich ist, ob zusätzliche Ausgaben in Höhe von ${betrag} € bei Titel ${zu} zu Lasten von Titel ${von} geleistet werden dürfen.`,
        2: isJa(2, false) ? "Es existiert ein Haushaltsvermerk..." : "Mindestens einer der beiden Titel hat keinen Haushaltsvermerk. Damit ist eine gegenseitige DF durch Haushaltsvermerke ausgeschlossen.",
        4: isJa(4, pgr_von === pgr_zu) 
            ? `Sowohl Titel ${zu} als auch Titel ${von} sind in der Produktgruppe ${pgr_von}.` 
            : `Titel ${zu} (PGr ${pgr_zu}) und Titel ${von} (PGr ${pgr_von}) liegen in unterschiedlichen Produktgruppen. Eine DF nach §3 Abs. 1 HG ist damit nicht gegeben.`,
        5: isJa(5, false) ? "Eine der Nummern 1-5 trifft zu." : "Keine der Nummern 1-5 aus §3 Abs. 1 HG trifft zu.",
        7: "Da eine Deckungsfähigkeit kraft Gesetzes nach §3 HG nicht vorliegt, ist eine Nachbewilligung nach §4 HG zu prüfen.",
        8: isJa(8, pgr_von === pgr_zu) ? "Beide Titel liegen in der gleichen Produktgruppe." : "Die Titel liegen nicht in der gleichen Produktgruppe.",
        10: isJa(10, parseFloat(betrag) < 100000) 
            ? `Die Summe von ${betrag} € liegt unter 100.000 €.` 
            : `Die Summe von ${betrag} € liegt über 100.000 €.`,
        12: isJa(12, pgr_von.substring(0,5) === pgr_zu.substring(0,5))
            ? `Beide Titel liegen im gleichen Produktbereich (${pgr_von.substring(0,5)}).`
            : `Die Titel liegen in unterschiedlichen Produktbereichen.`,
        13: isJa(13, parseFloat(betrag) < 100000)
            ? `Die Summe von ${betrag} € liegt unter 100.000 €.`
            : `Die Summe von ${betrag} € liegt über 100.000 €.`,
        14: isJa(14, (von[0] === "5" || von[0] === "6") && (zu[0] === "7" || zu[0] === "8"))
            ? `Da jedoch von Konsumptiv (HG ${von[0]}) zu Investiv (HG ${zu[0]}) umgeschichtet wird, greift die Ausnahme nach §4 Abs. 2 Nr. 3 HG.`
            : `Es greift keine der Ausnahmen von §4 Abs. 2 Nr. 1-3 HG.`,
        20: isJa(20, parseFloat(betrag) < 100000)
            ? `Nach §10 Abs. 4 Nr. 3 HG kann der Senator für Finanzen Nachbewilligungen bis 100.000 € zustimmen.`
            : `Da die Summe über 100.000 € liegt, ist §10 Abs. 4 Nr. 3 HG nicht anwendbar.`,
        21: `Letztlich ist die Zustimmung des Haushalts- und Finanzausschusses (HFA) nach §9 Abs. 2 Nr. 1 HG erforderlich.`
    };
    return texte[stepNum] || "";
}

function showResult() {
    document.getElementById("wizard").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    const sollPfadIds = getSollPfad();
    const istPfadIds = istPfad.map(p => p.step);
    
    const istPfadLabels = istPfad.map(p => p.label).join(" → ");
    const sollPfadLabels = sollPfadIds.map(id => flow[id]?.options?.[0]?.label || flow[id]?.label || "Start").filter(l => l !== "Start").join(" → ");

    const istMuster = istPfadIds.map(id => getMusterText(id, "user")).filter(t => t !== "").join("\n\n");
    const sollMuster = sollPfadIds.map(id => getMusterText(id, "objective")).filter(t => t !== "").join("\n\n");

    const abweichung = JSON.stringify(istPfadIds) !== JSON.stringify(sollPfadIds);
    
    document.getElementById("resTitle").innerText = abweichung ? "Fast richtig!" : "Perfekt gelöst!";
    document.getElementById("resDesc").innerText = abweichung 
        ? "Dein Weg weicht von der rechtlich korrekten Prüfung ab. Vergleiche unten die Begründungen." 
        : "Du hast alle Prüfungsschritte korrekt durchlaufen.";

    document.getElementById("resSummary").innerText = `ZU: ${answers.titel_zu} | VON: ${answers.titel_von} | BETRAG: ${answers.betrag} €\n\nDEIN WEG: ${istPfadLabels}\nSOLL WEG: ${sollPfadLabels}`;
    
    document.getElementById("userPathText").innerText = istMuster;
    document.getElementById("correctPathText").innerText = sollMuster;
}

init();
</script>
</body>
</html>

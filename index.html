<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fo24 Haushalts-Übungssassistent</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
.step { display: none; }
.step.active { display: block; }
</style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

<div class="bg-white p-8 rounded-2xl shadow-xl max-w-2xl w-full border">

<!-- HEADER -->
<div class="mb-6 text-center">
    <h1 class="text-xl font-bold">Haushalts-Prüfungsassistent</h1>
    <div class="w-full bg-slate-200 h-2 mt-3 rounded">
        <div id="progress" class="bg-blue-500 h-2 rounded transition-all"></div>
    </div>
</div>

<!-- WIZARD -->
<div id="wizard"></div>

<!-- RESULT -->
<div id="result" class="hidden mt-6">
    <h2 id="resTitle" class="text-xl font-bold mb-2"></h2>
    <p id="resDesc" class="mb-4"></p>

    <div class="bg-slate-50 p-3 text-xs font-mono mb-4 max-h-40 overflow-auto">
        <pre id="resSummary"></pre>
    </div>

    <button onclick="exportTxt()" class="bg-black text-white px-4 py-2 rounded mb-2">
        📄 Export
    </button>

    <br>
    <button onclick="location.reload()" class="text-sm underline">
        Neu starten
    </button>
</div>

</div>

<script>

// ================= STATE =================
let currentStep = 1;
let history = [1];
let answers = {};
let notes = {};
let finalStatus = "";
let finalDetail = "";

// ================= FLOW =================
const flow = {

    1: {
        type: "form",
        render: () => `
            <input id="titel_zu" type="text" placeholder="Zu Gunsten von Titel (z. B. 511 01-1)" class="w-full border p-2 mb-2 rounded">
            <input id="pgr_zu" type="text" placeholder="Produktgruppe z. B. 50.01.01" class="w-full border p-2 mb-2 rounded">
            <input id="titel_von" type="text" placeholder="Zu Lasten von Titel (z. B. 511 01-1)" class="w-full border p-2 mb-2 rounded">
            <input id="pgr_von" type="text" placeholder="Produktgruppe z. B. 50.01.01" class="w-full border p-2 mb-2 rounded">
            <input id="input_betrag" type="number" placeholder="Betrag €" class="w-full border p-2 mb-2 rounded">
    },

    2: {
        question: "Wer ist verantwortlich?",
        type: "select",
        options: ["Produktgruppenverantwortliche Person", "Produktbereichsverantwortliche Person", "Produktplanverantwortliche Person"],
        next: () => 2
    },

    3: {
        question: "Haben beide Titel einen HV?",
        type: "select",
        options: ["ja", "nein"],
        next: {
            ja: "END_SUCCESS",
            nein: 3
        },
        resultText: "Deckung durch HV zulässig."
    },

    4: {
        question: "Deckung nach §3 HG möglich?",
        type: "select",
        options: ["ja", "nein"],
        next: {
            ja: "END_SUCCESS",
            nein: 4
        },
        resultText: "Deckung nach §3 HG zulässig."
    },

    5: {
        question: "Deckung durch Mehreinnahmen?",
        type: "select",
        options: ["ja", "nein"],
        next: {
            ja: "END_CHECK",
            nein: "END_CHECK"
        }
    }
};

// ================= ENGINE =================
function next() {
    saveNote();

    const step = flow[currentStep];

    let input = true;

    if (step.type === "select") {
        input = document.querySelector("select")?.value;
        if (!input) return alert("Bitte auswählen");
        answers[currentStep] = input;
    }

    let nextStep = typeof step.next === "function"
        ? step.next()
        : step.next[input];

    if (nextStep === "END_SUCCESS") {
        finalStatus = "ZULÄSSIG";
        finalDetail = step.resultText;
        return showResult();
    }

    if (nextStep === "END_CHECK") {
        return finalCheck();
    }

    goTo(nextStep);
}

function goTo(step) {
    currentStep = step;
    history.push(step);
    render();
}

function back() {
    if (history.length > 1) {
        history.pop();
        currentStep = history[history.length - 1];
        render();
    }
}

// ================= RENDER =================
function render() {
    const step = flow[currentStep];
    const el = document.getElementById("wizard");

    let html = "";

    if (step.question) {
        html += `<h2 class="font-bold mb-3">${step.question}</h2>`;
    }

    if (step.type === "form") {
        html += step.render();
    }

    if (step.type === "select") {
        html += `
            <select class="w-full border p-2 mb-3 rounded">
                <option value="">Bitte wählen</option>
                ${step.options.map(o => `<option value="${o}">${o}</option>`).join("")}
            </select>
        `;
    }

    html += `
        <textarea id="note" placeholder="Notiz..." class="w-full border p-2 mb-3 rounded"></textarea>

        <div class="flex gap-2">
            <button onclick="next()" class="bg-blue-600 text-white px-4 py-2 rounded flex-1">Weiter</button>
            <button onclick="back()" class="bg-gray-300 px-4 py-2 rounded flex-1">Zurück</button>
        </div>
    `;

    el.innerHTML = html;

    updateProgress();
}

// ================= NOTES =================
function saveNote() {
    const val = document.getElementById("note")?.value;
    if (val) notes[currentStep] = val;
}

// ================= MUSTER =================
function getMusterText(step) {
    const betrag = document.getElementById('input_betrag')?.value || "0";
    const von = document.getElementById('titel_von')?.value || "";
    const zu = document.getElementById('titel_zu')?.value || "";

    const texte = {
        1: `Obersatz: Prüfung der Deckung ${betrag}€ von ${von} nach ${zu}`,
        2: "Prüfung HV",
        3: "Prüfung §3 HG",
        4: "Prüfung Mehreinnahmen"
    };

    return texte[step] || "";
}

// ================= FINAL CHECK =================
function finalCheck() {
    const betrag = parseFloat(document.getElementById('input_betrag')?.value) || 0;
    const von = document.getElementById('titel_von')?.value || "";
    const zu = document.getElementById('titel_zu')?.value || "";

    if (von.startsWith('441')) {
        finalStatus = "VORLAGE";
        finalDetail = "Titel 441 gesperrt";
    } else if (zu.startsWith('42') && !von.startsWith('42')) {
        finalStatus = "VORLAGE";
        finalDetail = "Personalkostenregel";
    } else if (betrag >= 100000) {
        finalStatus = "VORLAGE";
        finalDetail = "Vorlagepflicht";
    } else {
        finalStatus = "ZULÄSSIG";
        finalDetail = "Zulässig";
    }

    showResult();
}

// ================= RESULT =================
function showResult() {
    document.getElementById("wizard").innerHTML = "";
    document.getElementById("result").classList.remove("hidden");

    document.getElementById("resTitle").innerText =
        finalStatus === "ZULÄSSIG" ? "✅ Zulässig" : "⚖️ Vorlage";

    document.getElementById("resDesc").innerText = finalDetail;

    const notesText = Object.entries(notes)
        .map(([k,v]) => `${k}. ${v}`)
        .join("\n");

    let muster = history.map(s => getMusterText(s)).join("\n");

    document.getElementById("resSummary").innerText =
        `NOTIZEN:\n${notesText}\n\nMUSTER:\n${muster}`;

    document.getElementById("progress").style.width = "100%";
}

// ================= EXPORT =================
function exportTxt() {
    const text =
`ERGEBNIS: ${finalStatus}
DETAILS: ${finalDetail}

NOTIZEN:
${Object.entries(notes).map(([k,v]) => `${k}. ${v}`).join("\n")}
`;

    const blob = new Blob([text], {type:"text/plain"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "Protokoll.txt";
    a.click();
}

// ================= INIT =================
function updateProgress() {
    const total = Object.keys(flow).length;
    const p = (currentStep / total) * 100;
    document.getElementById("progress").style.width = p + "%";
}

render();

</script>

</body>
</html>

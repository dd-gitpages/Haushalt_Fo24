<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haushalts-Prüfungsassistent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .step { display: none; }
        .step.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
<div class="bg-white p-8 rounded-2xl shadow-xl max-w-2xl w-full border border-slate-200">

    <div class="mb-8 text-center">
        <h1 class="text-2xl font-bold text-slate-800">Haushalts-Prüfungsassistent</h1>
        <div class="w-full bg-slate-100 h-2 mt-4 rounded-full overflow-hidden">
            <div id="progress" class="bg-blue-500 h-full transition-all duration-500"></div>
        </div>
    </div>

    <div id="wizard">

        <!-- STEP 1 -->
        <div class="step active" id="step1">
            <h2 class="text-lg font-semibold mb-4 text-blue-800">Falldaten</h2>

            <input type="number" id="input_betrag" class="w-full border p-2 rounded-lg mb-3" placeholder="Betrag €">

            <div class="grid grid-cols-2 gap-3 mb-4">
                <input type="text" id="titel_von" class="border p-2 rounded-lg" placeholder="Titel von">
                <input type="text" id="titel_zu" class="border p-2 rounded-lg" placeholder="Titel zu">
            </div>

            <textarea id="note1" class="w-full border p-2 rounded-lg mb-4" placeholder="Obersatz..."></textarea>

            <button onclick="saveNote(1); goToStep(2)" class="w-full bg-blue-600 text-white py-3 rounded-xl">
                Start
            </button>
        </div>

        <!-- STEP 2 -->
        <div class="step" id="step2">
            <h2 class="text-lg font-semibold mb-4 text-blue-800">HV vorhanden?</h2>

            <textarea id="note2" class="w-full border p-2 rounded-lg mb-4"></textarea>

            <div class="flex gap-2">
                <button onclick="saveNote(2); finish('Deckung durch HV zulässig')"
                        class="bg-green-600 text-white px-4 py-2 rounded-lg flex-1">Ja</button>

                <button onclick="saveNote(2); goToStep(3)"
                        class="bg-slate-200 px-4 py-2 rounded-lg flex-1">Nein</button>

                <button onclick="goBack()"
                        class="bg-slate-300 px-4 py-2 rounded-lg flex-1">Zurück</button>
            </div>
        </div>

        <!-- STEP 3 -->
        <div class="step" id="step3">
            <h2 class="text-lg font-semibold mb-4 text-blue-800">§3 HG?</h2>

            <textarea id="note3" class="w-full border p-2 rounded-lg mb-4"></textarea>

            <div class="flex gap-2">
                <button onclick="saveNote(3); finish('Deckung nach §3 HG zulässig')"
                        class="bg-green-600 text-white px-4 py-2 rounded-lg flex-1">Ja</button>

                <button onclick="saveNote(3); goToStep(4)"
                        class="bg-slate-200 px-4 py-2 rounded-lg flex-1">Nein</button>

                <button onclick="goBack()"
                        class="bg-slate-300 px-4 py-2 rounded-lg flex-1">Zurück</button>
            </div>
        </div>

        <!-- STEP 4 -->
        <div class="step" id="step4">
            <h2 class="text-lg font-semibold mb-4 text-blue-800">Mehreinnahmen?</h2>

            <textarea id="note4" class="w-full border p-2 rounded-lg mb-4"></textarea>

            <div class="flex gap-2">
                <button onclick="saveNote(4); finalCheck(true)"
                        class="bg-blue-600 text-white px-4 py-2 rounded-lg flex-1">Ja</button>

                <button onclick="saveNote(4); finalCheck(false)"
                        class="bg-slate-200 px-4 py-2 rounded-lg flex-1">Nein</button>

                <button onclick="goBack()"
                        class="bg-slate-300 px-4 py-2 rounded-lg flex-1">Zurück</button>
            </div>
        </div>
    </div>

    <!-- RESULT -->
    <div id="result" class="hidden mt-6">
        <h2 id="resTitle" class="text-xl font-bold mb-2"></h2>
        <p id="resDesc" class="mb-4"></p>

        <button onclick="location.reload()" class="text-blue-600 underline">
            Neue Prüfung
        </button>
    </div>

</div>

<script>
let collectedNotes = {};
let stepHistory = [1];
let currentStep = 1;

function goToStep(step) {
    currentStep = step;
    stepHistory.push(step);
    renderStep();
}

function goBack() {
    if (stepHistory.length > 1) {
        stepHistory.pop();
        currentStep = stepHistory[stepHistory.length - 1];
        renderStep();
    }
}

function renderStep() {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById('step' + currentStep).classList.add('active');
    updateProgress();
}

function updateProgress() {
    const totalSteps = 4;
    const progress = (currentStep / totalSteps) * 100;
    document.getElementById('progress').style.width = progress + '%';
}

function saveNote(step) {
    const val = document.getElementById('note' + step).value;
    if (val) collectedNotes[step] = val;
}

function finish(msg) {
    showResult("ZULÄSSIG", msg);
}

function finalCheck(isMehreinnahme) {
    const betrag = parseFloat(document.getElementById('input_betrag').value) || 0;
    const von = document.getElementById('titel_von').value || "";
    const zu = document.getElementById('titel_zu').value || "";

    if (von.startsWith('441')) {
        return showResult("VORLAGE", "Abgang von Titel 441 unzulässig");
    }

    if (zu.startsWith('42') && !von.startsWith('42')) {
        return showResult("VORLAGE", "Personalkosten nur aus Personalkosten deckbar");
    }

    if (betrag >= 100000) {
        return showResult("VORLAGE", "Vorlagepflicht (>=100k)");
    }

    if (isMehreinnahme) {
        return showResult("ZULÄSSIG", "Deckung durch Mehreinnahmen");
    }

    return showResult("ZULÄSSIG", "Deckung unter 100k zulässig");
}

function showResult(status, detail) {
    document.getElementById('wizard').classList.add('hidden');
    document.getElementById('result').classList.remove('hidden');

    document.getElementById('resTitle').innerText =
        status === "ZULÄSSIG" ? "✅ Zulässig" : "⚖️ Vorlage erforderlich";

    document.getElementById('resDesc').innerText = detail;

    document.getElementById('progress').style.width = "100%";
}

// init
updateProgress();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lernassistent Fo24 Haushalt</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
.step { display: none; }
.step.active { display: block; }
</style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

<div class="bg-white p-8 rounded-2xl shadow-xl max-w-2xl w-full border">

<!-- HEADER -->
<div class="mb-6 text-center">
    <h1 class="text-xl font-bold">Lernassistent Fo24 Haushalt</h1>
    <div class="w-full bg-slate-200 h-2 mt-3 rounded">
        <div id="progress" class="bg-blue-500 h-2 rounded transition-all"></div>
    </div>
</div>

<!-- WIZARD -->
<div id="wizard"></div>

<!-- RESULT -->
<div id="result" class="hidden mt-6">
    <h2 id="resTitle" class="text-xl font-bold mb-2"></h2>
    <p id="resDesc" class="mb-4"></p>

    <div class="bg-slate-50 p-3 text-xs font-mono mb-4 max-h-40 overflow-auto">
        <pre id="resSummary"></pre>
    </div>

    <button onclick="exportTxt()" class="bg-black text-white px-4 py-2 rounded mb-2">
        📄 Export
    </button>

    <br>
    <button onclick="location.reload()" class="text-sm underline">
        Neu starten
    </button>
</div>

</div>

<script>
let currentStep = 1;
let history = [1];
let answers = {};
let notes = {};
let finalStatus = "";
let finalDetail = "";

const flow = {
    1: {
        type: "form",
        render: () => `
            <input id="titel_zu" type="text" placeholder="Zu Gunsten von (z. B. 511 01-1)" class="w-full border p-2 mb-2 rounded">
            <input id="pgr_zu" type="text" placeholder="Produktgruppe (z. B. 50.01.01)" class="w-full border p-2 mb-2 rounded">
            <input id="titel_von" type="text" placeholder="Zu Lasten von (z. B. 511 01-1)" class="w-full border p-2 mb-2 rounded">
            <input id="pgr_von" type="text" placeholder="Produktgruppe (z. B. 50.01.01)" class="w-full border p-2 mb-2 rounded">
            <input id="input_betrag" type="number" placeholder="Betrag €" class="w-full border p-2 mb-2 rounded">`,
        next: () => 2
    },
    2: {
        question: "Haben beide Titel einen Haushaltsvermerk (HV)?",
        type: "select",
        options: ["ja", "nein"],
        next: { "ja": 3, "nein": 4 },
    },
    3: {
        question: "Regeln beide Haushaltsvermerke die gegenseitige Deckungsfähigkeit (DF)? Ggf. auch über einen Deckungskreis.",
        type: "select",
        options: ["ja", "nein"],
        next: { "ja": "END_SUCCESS", "nein": 4 },
        resultText: "Deckungsfähigkeit durch HV gegeben. Die Mehrausgabe ist zulässig."
    },
    4: {
        getQuestion: () => {
            const von = answers.titel_von || "unbekannt";
            const zu = answers.titel_zu || "unbekannt";
            return `Sind Titel ${von} und Titel ${zu} in der gleichen Produktgruppe?`;
        },         
        type: "select",
        options: ["ja", "nein"],
        next: { "ja": 5, "nein": 7 },
    },
    5: {
        question: "Trifft eine der Nummern 1-5 von §3 Abs. 1 HG zu?",
        type: "select",
        options: ["Nr. 1: 422 <-> 428", "Nr. 2: 4xx -> 4xx. Ausnahme 441","Nr. 3: 5xx -> 5xx","Nr. 4: 6xx -> 6xx","Nr. 5: 985 <-> 986","keine"],
        next: { "Nr. 1: 422 <-> 428": 6, "Nr. 2: 4xx -> 4xx. Ausnahme 441": 6,"Nr. 3: 5xx -> 5xx": 6,"Nr. 4: 6xx -> 6xx": 6,"Nr. 5: 985 <-> 986": 6,"keine": 7}
    },
    6: {
        getQuestion: () => {
            const von = answers.titel_von || "unbekannt";
            const zu = answers.titel_zu || "unbekannt";
            return `Verfügt der Titel ${von} über einen HV, der eine DF mit einem anderen Titel als ${zu} regelt?`;
        }, 
        type: "select",
        options: ["ja", "nein"],
        next: { "ja": 6, "nein": "END_SUCCESS" },
        resultText: "Deckungsfähigkeit nach §3 Abs. 1 HG gegeben. Die Mehrausgabe ist zulässig."
    },
    7: {
        question: "Mit welchem Absatz von §4 HG möchtest du fortfahren?",
        type: "select",
        options: ["§4 Abs. 1", "§4 Abs. 2","§4 Abs. 3"],
        next: { "§4 Abs. 1": 8, "§4 Abs. 2": 12, "§4 Abs. 3": 15 }
    },
    8: {
        getQuestion: () => {
            const von = answers.titel_von || "unbekannt";
            const zu = answers.titel_zu || "unbekannt";
            return `Sind Titel ${von} und Titel ${zu} in der gleichen Produktgruppe?`;
        },         
        type: "select",
        options: ["ja", "nein"],
        next: { "ja": 8, "nein": 9 },
    },
    9: {
        getQuestion: () => {
            const von = answers.titel_von || "unbekannt";
            const zu = answers.titel_zu || "unbekannt";
            return `Ist Titel ${von} in der Hauptgruppe 5 oder 6 und Titel ${zu} in der Hauptgruppe 7 oder 8`;
        },         
        type: "select",
        options: ["ja", "nein"],
        next: { "ja": "END_SUCCESS", "nein": 10 },
        resultText: "Nachbewilligung durch produktgruppenverantwortliche Person nach §4 Abs. 1 Nr. 1 HG möglich. Die Mehrausgabe ist zulässig." 
    },
    10: {
        question: "Liegt die Summe unter 100000 €?",
        type: "select",
        options: ["ja", "nein"],
        next: { "ja": 11, "nein": 20 },
    },
    11: {
        question: "Trifft eine der Ausnahmen a-c von §4 Abs. 1 Nr. 2 HG zu?",
        type: "select",
        options: [
        "a): x -> 422 oder 428", 
        "b): 441 -> x",
        "c): 7xx oder 8xx -> 4xx,5xx oder 6xx", 
        "keine"
    ],
    next: () => {
        const auswahl = document.querySelector("select")?.value;
        if (auswahl === "a): x -> 422 oder 428") return 20;
        if (auswahl === "b): 441 -> x") return 20;
        if (auswahl === "c): 7xx oder 8xx -> 4xx,5xx oder 6xx") return 20;
        if (auswahl === "keine") {
            const ersteZiffer = (answers.titel_von || "").charAt(0);
            if (["1", "2", "3"].includes(ersteZiffer)) {
                return 19;
            } 
            else {
                return "END_SUCCESS";
            }
        }
    },
        resultText: "Nachbewilligung durch produktgruppenverantwortliche Person nach §4 Abs. 1 Nr. 2 HG möglich. Die Mehrausgabe ist zulässig."
    },
    12: {
        getQuestion: () => {
            const von = answers.titel_von || "unbekannt";
            const zu = answers.titel_zu || "unbekannt";
            return `Sind Titel ${von} und Titel ${zu} in dem gleichen Produktbereich?`;
        },         
        type: "select",
        options: ["ja", "nein"],
        next: { "ja": 13, "nein": 20 },
    },
    13: {
        question: "Liegt die Summe unter 100000 €?",
        type: "select",
        options: ["ja", "nein"],
        next: { "ja": 14, "nein": 21 },
    },
    14: {
        question: "Trifft eine der Ausnahmen 1-3 von §4 Abs. 2 HG zu?",
        type: "select",
        options: [
        "Nr. 1: x -> 422 oder 428", 
        "Nr. 2: 441 -> x",
        "Nr. 3: 7xx oder 8xx -> 4xx,5xx oder 6xx", 
        "keine"
    ],
    next: () => {
        const auswahl = document.querySelector("select")?.value;
        if (auswahl === "Nr. 1: x -> 422 oder 428") return 18;
        if (auswahl === "Nr. 2: 441 -> x") return 20;
        if (auswahl === "Nr. 3: 7xx oder 8xx -> 4xx,5xx oder 6xx") return 20;
        if (auswahl === "keine") {
            const ersteZiffer = (answers.titel_von || "").charAt(0);
            if (["1", "2", "3"].includes(ersteZiffer)) {
                return 19;
            } 
            else {
                return "END_SUCCESS";
            }
        }
    },
            resultText: "Nachbewilligung durch produktbereichsverantwortliche Person nach §4 Abs. 2 HG möglich. Die Mehrausgabe ist zulässig."
    },
    15: {
        getQuestion: () => {
            const von = answers.titel_von || "unbekannt";
            const zu = answers.titel_zu || "unbekannt";
            return `Sind Titel ${von} und Titel ${zu} in dem gleichen Produktplan?`;
        },         
        type: "select",
        options: ["ja", "nein"],
        next: { "ja": 16, "nein": 20 },
    },
    16: {
        question: "Liegt die Summe unter 100000 €?",
        type: "select",
        options: ["ja", "nein"],
        next: { "ja": 17, "nein": 21 },
    },
    17: {
    question: "Trifft eine der Ausnahmen 1-3 von §4 Abs. 3 HG zu?",
    type: "select",
    options: [
        "Nr. 1: x -> 422 oder 428", 
        "Nr. 2: 441 -> x",
        "Nr. 3: 7xx oder 8xx -> 4xx,5xx oder 6xx", 
        "keine"
    ],
    next: () => {
        const auswahl = document.querySelector("select")?.value;
        if (auswahl === "Nr. 1: x -> 422 oder 428") return 18;
        if (auswahl === "Nr. 2: 441 -> x") return 20;
        if (auswahl === "Nr. 3: 7xx oder 8xx -> 4xx,5xx oder 6xx") return 20;
        if (auswahl === "keine") {
            const ersteZiffer = (answers.titel_von || "").charAt(0);
            if (["1", "2", "3"].includes(ersteZiffer)) {
                return 19;
            } 
            else {
                return "END_SUCCESS";
            }
        }
    },
    resultText: "Nachbewilligung durch produktplanverantwortliche Person nach §4 Abs. 3 HG möglich. Die Mehrausgabe ist zulässig."
}, 18: {
        question: "Handelt es sich um Nachbewilligung zwischen den Gruppen 422 und 428?",
        type: "select",
        options: ["ja", "nein"],
        next: { "ja": "END_SUCCESS", "nein": 20 },
        getResultText: () => {
        const verantwortlich = answers[7];
        if (verantwortlich  === "§4 Abs. 2") {
            return `Nachbewilligung durch produktbereichsverantwortliche Person nach §4 Abs. 6 in Verbindung mit §4 Abs. 2 HG möglich. Die Mehrausgabe ist zulässig.`;
        } else {
            return `Nachbewilligung durch produktplanverantwortliche Person nach §4 Abs. 6 in Verbindung mit §4 Abs. 3 HG möglich. Die Mehrausgabe ist zulässig.`;
        }
        }
    },
    19: {
        getQuestion: () => {
            const von = answers.titel_von || "unbekannt";
            const zu = answers.titel_zu || "unbekannt";
            return `Stehen bei Titel ${von} Mehreinnahmen in Höhe der zusätzlichen Ausgaben bei Titel ${zu} zur verfügung?`;
        },
        type: "select",
        options: ["ja", "nein"],
        next: { "ja": "END_CHECK", "nein": 20 }
    },
    20: {
        question: "Liegt die Summe unter 100000 €?",
        type: "select",
        options: ["ja", "nein"],
        next: { "ja": "END_CHECK", "nein": 21 }
    },
    21: {
        question: "Nachbewilligung durch Haushalts und Finanzausschuss",
        type: "select",
        options: ["ja", "nein"],
        next: { "ja": "END_CHECK", "nein": "END_CHECK" }
    }
};

function next() {
    if (currentStep === 1) {
        answers.titel_zu = document.getElementById('titel_zu').value;
        answers.titel_von = document.getElementById('titel_von').value;
        answers.pgr_zu = document.getElementById('pgr_zu').value;
        answers.pgr_von = document.getElementById('pgr_von').value;
        answers.betrag = parseFloat(document.getElementById('input_betrag').value) || 0;
    }

    saveNote();
    const step = flow[currentStep];
    let inputVal = "";

    if (step.type === "select") {
        inputVal = document.querySelector("select")?.value;
        if (!inputVal) return alert("Bitte auswählen");
        answers[currentStep] = inputVal;
    }

    let nextStep = typeof step.next === "function" ? step.next() : step.next[inputVal];

    if (nextStep === "END_SUCCESS") {
        finalStatus = "ZULÄSSIG";
        finalDetail = typeof step.getResultText === "function" 
        ? step.getResultText() 
        : step.resultText;
        return showResult();
    }
    if (nextStep === "END_CHECK") return finalCheck();

    goTo(nextStep);
}

function goTo(step) {
    currentStep = step;
    history.push(step);
    render();
}

function back() {
    if (history.length > 1) {
        history.pop();
        currentStep = history[history.length - 1];
        render();
    }
}

function render() {
    const step = flow[currentStep];
    const el = document.getElementById("wizard");
    let html = "";
    const questionText = step.getQuestion ? step.getQuestion() : step.question;
    
    if (questionText) {
        html += `<h2 class="font-bold mb-3">${questionText}</h2>`;
    }
    if (step.type === "form") html += step.render();
    if (step.type === "select") {
        html += `<select class="w-full border p-2 mb-3 rounded">
                    <option value="">Bitte wählen</option>
                    ${step.options.map(o => `<option value="${o}">${o}</option>`).join("")}
                 </select>`;
    }

    html += `<textarea id="note" placeholder="Dein Prüftext" class="w-full border p-2 mb-3 rounded"></textarea>`;
    html += `<div class="flex gap-2">
                ${currentStep > 1 ? `<button onclick="back()" class="bg-gray-300 px-4 py-2 rounded flex-1">Zurück</button>` : ''}
                <button onclick="next()" class="bg-blue-600 text-white px-4 py-2 rounded flex-1">Weiter</button>
             </div>`;
    el.innerHTML = html;
    updateProgress();
}

function saveNote() {
    const val = document.getElementById("note")?.value;
    if (val) notes[currentStep] = val;
}

function getMusterText(stepNum) {
    const betrag = answers.betrag || "0";
    const von = answers.titel_von || "";
    const zu = answers.titel_zu || "";
    const pgr_von = answers.pgr_von || "";
    const pgr_zu = answers.pgr_zu || "";
    const HV = answers[2];
    const DF = answers[3];
    const pgr = answers[4];
    const hgr_von = (answers.titel_von || "").charAt(0);
    const hgr_zu = (answers.titel_zu || "").charAt(0);
    const gr_von = (answers.titel_von || "").slice(0,2);
    const gr_zu = (answers.titel_zu || "").slice(0,2);

    const texte = {
    1: `Fraglich ist, ob zusätzliche Ausgaben in Höhe von ${betrag}€ bei Titel ${zu} zu Lasten von Titel ${von} geleistet werden dürfen.`,
    
    2: answers[2] === "ja"
        ? `Zunächst ist eine Deckungsfähigkeit (DF) über Haushaltsvermerke (HV) zu prüfen. Dafür müssten bei beiden Titeln HV vorliegen und diese die DF mit dem jeweils anderen Titel regeln.`
        : "Mindestens einer der beiden Titel hat keinen HV. Damit ist eine gegenseitige DF durch HV ausgeschlossen.",
    
    3: answers[3] === "ja" 
        ? `Sowohl Titel ${zu} als auch Titel ${von} haben einen HV, welcher die gegenseitige Deckungsfähigkeit regelt. Damit können die zusätzlichen Ausgaben bei Titel ${zu} geleistet werden.` 
        : `Zwar tragen sowohl Titel ${zu} als auch Titel ${von} einen HV, diese regeln jedoch keine gegenseitige Deckungsfähigkeit. Damit ist eine gegenseitige DF durch HV ausgeschlossen.`,
    
    4: answers[4] === "ja"
        ? `Als nächstes ist festzustellen, ob eine Deckungsfähigkeit nach §3 Abs. 1 HG besteht. Dafür müssten beide Titel in der gleichen Produktgruppe sein. Sowohl Titel ${zu} als auch Titel ${von} sind in der Produktgruppe ${pgr_von}.`
        : `Als nächstes ist festzustellen, ob eine Deckungsfähigkeit nach §3 Abs. 1 HG besteht. Dafür müssten beide Titel in der gleichen Produktgruppe sein. Titel ${zu} ist in PGR ${pgr_zu} und Titel ${von} in PGR ${pgr_von}. Eine DF nach §3 Abs. 1 HG ist damit nicht gegeben.`,
    
    5: (() => {
        const auswahl = answers[5];
        if (auswahl === "Nr. 1: 422 <-> 428") {
            return `Da Titel ${von} in Gruppe ${von.substring(0,3)} und Titel ${zu} in Gruppe ${zu.substring(0,3)} ist, trifft Nr. 1 zu. Damit ist eine gegenseitige DF nach §3 Abs. 1 Nr. 1 HG gegeben.`;
        }
        if (auswahl === "Nr. 2: 4xx -> 4xx. Ausnahme 441") {
            return `Da Titel ${von} in Hauptgruppe ${von[0]} und Titel ${zu} ebenfalls in Hauptgruppe ${zu[0]} ist, und keiner der beiden in Gruppe 441, trifft Nr. 2 zu. Damit ist eine gegenseitige DF nach §3 Abs. 1 Nr. 2 HG gegeben.`;
        }
        if (auswahl === "Nr. 3: 5xx -> 5xx") {
            return `Da Titel ${von} in Hauptgruppe ${von[0]} und Titel ${zu} ebenfalls in Hauptgruppe ${zu[0]} ist, trifft Nr. 3 zu. Damit ist eine gegenseitige DF nach §3 Abs. 1 Nr. 3 HG gegeben.`;
        }
        if (auswahl === "Nr. 4: 6xx -> 6xx") {
            return `Da Titel ${von} in Hauptgruppe ${von[0]} und Titel ${zu} ebenfalls in Hauptgruppe ${zu[0]} ist, trifft Nr. 4 zu. Damit ist eine gegenseitige DF nach §3 Abs. 1 Nr. 4 HG gegeben.`;
        }
        if (auswahl === "Nr. 5: 985 <-> 986") {
            return `Da Titel ${von} in Gruppe ${von.substring(0,3)} und Titel ${zu} in Gruppe ${zu.substring(0,3)} ist, trifft Nr. 5 zu. Damit ist eine gegenseitige DF nach §3 Abs. 1 Nr. 5 HG gegeben.`;
        }
        if (auswahl === "keine") {
            return `Da eine gegenseitige Deckungsfähigkeit der Titel ${von} und ${zu} durch keine der Nummern 1-5 gedeckt ist, ist eine gegenseitige DF nach §3 Abs. 1 HG nicht gegeben.`;
        }
    })(),
    6: (() => {
        const auswahl = answers[5];
        const auswahl2 = answers[6];
        if (auswahl === "Nr. 1: 422 <-> 428" && auswahl2 ==="nein") {
            return `Da für Titel ${von} keine andere Regelung zur Deckungsfähigkeit durch einen HV geregelt ist, trifft §3 Abs. 2 HG nicht zu. Folglich ist eine gegenseitige DF nach §3 Abs. 1 Nr. 1 gegeben.`;
        }
        if (auswahl === "Nr. 2: 4xx -> 4xx. Ausnahme 441" && auswahl2 ==="nein") {
            return `Da für Titel ${von} keine andere Regelung zur Deckungsfähigkeit durch einen HV geregelt ist, trifft §3 Abs. 2 HG nicht zu. Folglich ist eine gegenseitige DF nach §3 Abs. 1 Nr. 2 gegeben.`;
        }
        if (auswahl === "Nr. 3: 5xx -> 5xx" && auswahl2 ==="nein") {
            return `Da für Titel ${von} keine andere Regelung zur Deckungsfähigkeit durch einen HV geregelt ist, trifft §3 Abs. 2 HG nicht zu. Folglich ist eine gegenseitige DF nach §3 Abs. 1 Nr. 3 gegeben.`;
        }
        if (auswahl === "Nr. 4: 6xx -> 6xx" && auswahl2 ==="nein") {
            return `Da für Titel ${von} keine andere Regelung zur Deckungsfähigkeit durch einen HV geregelt ist, trifft §3 Abs. 2 HG nicht zu. Folglich ist eine gegenseitige DF nach §3 Abs. 1 Nr. 4 gegeben.`;
        }
        if (auswahl === "Nr. 5: 985 <-> 986" && auswahl2 ==="nein") {
            return `Da für Titel ${von} keine andere Regelung zur Deckungsfähigkeit durch einen HV geregelt ist, trifft §3 Abs. 2 HG nicht zu. Folglich ist eine gegenseitige DF nach §3 Abs. 1 Nr. 5 gegeben.`;
        }
        if (auswahl2 === "ja") {
            return `Da ein HV für Titel ${von} eine gegenseitige DF mit einem anderen Titel als ${zu} regelt, ist durch §3 Abs. 2 HG eine Deckungsfähigkeit ausgeschlossen`;
        }
        if (auswahl === "keine" || !auswahl2) {
            return ""; 
        }
    })(),
    7: (() => {
        const auswahl = answers[7];
        if (auswahl === "§4 Abs. 1") {
            return `Da Titel ${von} und Titel ${zu} beide in Produktgruppe ${pgr_zu} sind, ist nun eine Nachbewilligung nach §4 Abs. 1 Nr. 1 HG zu prüfen.`;
        }
        if (auswahl === "§4 Abs. 2") {
            return `Da Titel ${von} und Titel ${zu} beide im Produktbereich ${pgr_zu.substring(0,5)} sind, ist nun eine Nachbewilligung nach §4 Abs. 2 HG zu prüfen.`;
        }
        if (auswahl === "§4 Abs. 3") {
            return `Da Titel ${von} und Titel ${zu} beide im Produktplan ${pgr_zu.substring(0,2)} sind, ist nun eine Nachbewilligung nach §4 Abs. 3 HG zu prüfen.`;
        }
    })()
    };
    return texte[stepNum] || "";
}

function finalCheck() {
    const betrag = answers.betrag || 0;
    const von = answers.titel_von || "";
    const zu = answers.titel_zu || "";
    const pgr_von = answers.pgr_von || "";
    const pgr_zu = answers.pgr_zu || "";

    if (von.startsWith('441')) {
        finalStatus = "VORLAGE";
        finalDetail = "Titel 441 ist gesperrt.";
    } else if (zu.startsWith('42') && !von.startsWith('42')) {
        finalStatus = "VORLAGE";
        finalDetail = "Personalausgaben dürfen nur durch Personalausgaben gedeckt werden.";
    } else if (betrag >= 100000) {
        finalStatus = "VORLAGE";
        finalDetail = "Betrag über 100.000 € erfordert Vorlage.";
    } else {
        finalStatus = "ZULÄSSIG";
        finalDetail = "Die Maßnahme ist haushaltsrechtlich zulässig.";
    }
    showResult();
}

function showResult() {
    document.getElementById("wizard").innerHTML = "";
    document.getElementById("result").classList.remove("hidden");
    document.getElementById("resTitle").innerText = finalStatus === "ZULÄSSIG" ? "✅ Zulässig" : "Nicht erlaubt";
    document.getElementById("resDesc").innerText = finalDetail;

    const notesText = Object.entries(notes).map(([k,v]) => `${v}`).join("\n");
    let muster = history.map(s => getMusterText(s)).join("\n");

    document.getElementById("resSummary").innerText = 
        `DATEN: ${answers.betrag}€ von ${answers.titel_von} an ${answers.titel_zu}\n\n` +
        `DEINE LÖSUNG:\n${notesText}\n\nMUSTERLÖSUNG:\n${muster}`;
    document.getElementById("progress").style.width = "100%";
}

function updateProgress() {
    const total = Object.keys(flow).length;
    const p = (currentStep / total) * 100;
    document.getElementById("progress").style.width = p + "%";
}
function exportTxt() {
    const datum = new Date().toLocaleString("de-DE");
    let prüfungsSchritte = history
        .map(s => getMusterText(s))
        .filter(text => text !== "")
        .join("\n\n");

    let notizenText = Object.entries(notes)
        .map(([step, text]) => `Schritt ${step}: ${text}`)
        .join("\n");

    const text = `Zusammenfassung
Datum: ${datum}
--------------------------------------------------
FALLDATEN:
Zu:  ${answers.titel_zu} (PGR: ${answers.pgr_zu})
Von:   ${answers.titel_von} (PGR: ${answers.pgr_von})
Betrag:      ${answers.betrag} €
--------------------------------------------------
ERGEBNIS:    ${finalStatus}
BEGRÜNDUNG:  ${finalDetail}
--------------------------------------------------
DEINE LÖSUNG:
${notizenText || "Keine Lösung eingeben."}
--------------------------------------------------
MUSTERLÖSUNG:
